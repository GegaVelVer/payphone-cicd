<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmación de pago - Payphone</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      padding: 32px;
      width: 420px;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px auto;
      font-size: 32px;
      color: #fff;
    }
    .icon.approved { background: #2e7d32; }
    .icon.pending  { background: #f9a825; }
    .icon.canceled { background: #c62828; }
    .icon.loading  { background: #5a2d82; }

    h1 { font-size: 20px; margin: 0 0 6px 0; color: #333; }
    p.status-text { color: #777; font-size: 14px; margin-bottom: 20px; }

    .detalle {
      text-align: left;
      background: #faf7fd;
      border-radius: 10px;
      padding: 16px;
      font-size: 13px;
      color: #444;
    }
    .detalle div {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
    }
    .detalle div:last-child { border-bottom: none; }
    .detalle span.label { color: #888; }
    .detalle span.value { font-weight: 600; text-align: right; }

    .btn-volver {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      background: #5a2d82;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
    }
    pre.raw-json {
      text-align: left;
      background: #1e1e1e;
      color: #9cdcfe;
      font-size: 11px;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon loading" id="icono">â³</div>
    <h1 id="titulo">Verificando tu pago...</h1>
    <p class="status-text" id="subtitulo">Estamos confirmando la transacciÃ³n con Payphone.</p>

    <div class="detalle" id="detalle" style="display:none;">
      <div><span class="label">Estado:</span><span class="value" id="d-estado">-</span></div>
      <div><span class="label">ID TransacciÃ³n:</span><span class="value" id="d-id">-</span></div>
      <div><span class="label">ID Cliente (referencia):</span><span class="value" id="d-clienteTx">-</span></div>
      <div><span class="label">Monto:</span><span class="value" id="d-monto">-</span></div>
      <div><span class="label">Email:</span><span class="value" id="d-email">-</span></div>
      <div><span class="label">Tipo de tarjeta:</span><span class="value" id="d-tarjeta">-</span></div>
      <div><span class="label">CÃ³digo de autorizaciÃ³n:</span><span class="value" id="d-auth">-</span></div>
    </div>

    <pre class="raw-json" id="rawJson" style="display:none;"></pre>

    <a href="index.html" class="btn-volver">Volver a la tienda</a>
  </div>

  <script>
    // ===== CONFIGURACIÃ“N =====
    const PAYPHONE_TOKEN = "__PAYPHONE_TOKEN__";

    // Payphone redirige aquÃ­ agregando ?id=XXXX&clientTransactionId=YYYY en la URL
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const clientTransactionId = params.get("clientTransactionId");

    const iconoEl = document.getElementById("icono");
    const tituloEl = document.getElementById("titulo");
    const subtituloEl = document.getElementById("subtitulo");
    const detalleEl = document.getElementById("detalle");
    const rawJsonEl = document.getElementById("rawJson");

    function mostrarError(mensaje) {
      iconoEl.className = "icon canceled";
      iconoEl.textContent = "âœ•";
      tituloEl.textContent = "No se pudo confirmar el pago";
      subtituloEl.textContent = mensaje;
    }

    function pintarResultado(data) {
      // FunciÃ³n Confirm: procesamos el response del API y mostramos los datos relevantes
      const estado = data.transactionStatus || "Desconocido";

      if (estado === "Approved") {
        iconoEl.className = "icon approved";
        iconoEl.textContent = "âœ“";
        tituloEl.textContent = "Â¡Pago aprobado!";
        subtituloEl.textContent = "Tu transacciÃ³n se completÃ³ correctamente.";
      } else if (estado === "Pending") {
        iconoEl.className = "icon pending";
        iconoEl.textContent = "â³";
        tituloEl.textContent = "Pago pendiente";
        subtituloEl.textContent = "La transacciÃ³n estÃ¡ siendo procesada.";
      } else {
        iconoEl.className = "icon canceled";
        iconoEl.textContent = "âœ•";
        tituloEl.textContent = "Pago no completado";
        subtituloEl.textContent = "La transacciÃ³n fue cancelada o rechazada.";
      }

      document.getElementById("d-estado").textContent = estado;
      document.getElementById("d-id").textContent = data.transactionId || id || "-";
      document.getElementById("d-clienteTx").textContent = data.clientTransactionId || clientTransactionId || "-";
      document.getElementById("d-monto").textContent = data.amount ? ("$" + data.amount + " " + (data.currency || "USD")) : "-";
      document.getElementById("d-email").textContent = data.email || "-";
      document.getElementById("d-tarjeta").textContent = data.cardType || "-";
      document.getElementById("d-auth").textContent = data.authorizationCode || "-";

      detalleEl.style.display = "block";

      // Mostramos el JSON completo del response, Ãºtil para la documentaciÃ³n/captura
      rawJsonEl.style.display = "block";
      rawJsonEl.textContent = JSON.stringify(data, null, 2);
    }

    async function confirmarPago() {
      if (!id || !clientTransactionId) {
        mostrarError("No se recibieron los parÃ¡metros 'id' y 'clientTransactionId' en la URL.");
        return;
      }

      try {
        // Llamada a la funciÃ³n Confirm del API de Payphone (REQUEST)
        const response = await fetch("https://paymentbox.payphonetodoesposible.com/api/confirm", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + PAYPHONE_TOKEN
          },
          body: JSON.stringify({
            id: parseInt(id),
            clientTxId: clientTransactionId
          })
        });

        if (!response.ok) {
          throw new Error("Error HTTP " + response.status);
        }

        const data = await response.json(); // RESPONSE recibido del API
        pintarResultado(data);

      } catch (error) {
        mostrarError("OcurriÃ³ un error al consultar el estado del pago: " + error.message);
      }
    }

    confirmarPago();
  </script>

</body>
</html>
